backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "المقالات"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "عنوان المقال", name: "title", widget: "string" }
      - { label: "تاريخ النشر", name: "date", widget: "datetime" }
      - { label: "وصف قصير", name: "excerpt", widget: "text" }
      - { label: "صورة الغلاف", name: "cover_image", widget: "image", required: false }
      - { label: "نص المقال", name: "body", widget: "markdown" }